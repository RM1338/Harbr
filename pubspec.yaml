name: harbr
description: "Harbr — Smart Parking Reservation & Monitoring"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.5

  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.5
  firebase_database: ^10.5.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Icons
  lucide_icons: ^0.257.0

  # Fonts
  google_fonts: ^6.2.1

  # HTTP
  dio: ^5.4.3+1

  # UI
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  influxdb_client: ^2.11.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
